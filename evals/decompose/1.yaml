task_description: |
  # TDD: Git Commit Splitting Agent

  - **Author**: Nancy Task Planner
  - **Status**: Inception
  - **Reviewers**: @project-lead

  ## Summary

  This document outlines the technical design for an agent that takes a set of git commits and splits them into a new, more granular, and logically organized set of commits. The primary goal is to improve the code review process by presenting changes in an easy-to-digest, atomic fashion. Each commit in the new series will be self-contained and must pass the project's test suite.

  ## Background/Context

  In the course of software development, it's common for commits to be created in an ad-hoc manner. A developer might fix a bug, refactor a related piece of code, and add a new feature all within a single commit or a small series of messy commits. When this work is submitted for review, it can be difficult for reviewers to follow the logic, understand the changes, and provide effective feedback.

  The best practice is to have "atomic" commits, where each commit represents a single logical change. This includes all related code, tests, and documentation. Manually cleaning up commit history using tools like `git rebase -i` can be time-consuming and error-prone. This agent aims to automate this process.

  ## Goals/Non-Goals

  ### Goals

  *   **Automated Commit Splitting:** The agent will take a git commit range as input and produce a new series of commits on a new branch.
  *   **Atomic Commits:** The generated commits should be atomic, containing a single logical change (including code, tests, and documentation).
  *   **Guaranteed Test-Passing Commits:** Every commit in the generated series must pass the project's test suite.
  *   **Test Discovery:** The agent will attempt to automatically discover how to run the project's tests.
  *   **Handles Broken History:** The agent will be able to process an input commit range that contains commits where tests fail. The initial and final states of the range must pass tests.

  ### Non-Goals

  *   **Fully Automated Semantic Understanding:** The initial version of the agent will rely on heuristics, not deep semantic understanding of the code. It will not attempt to understand the "intent" of the code.
  *   **Commit Message Generation:** The agent will not automatically write human-quality commit messages. It may use a template, but the user will be expected to refine them.
  *   **Support for All Programming Languages:** While the agent will be language-agnostic in its git operations, the more advanced analysis features may initially be limited to a specific set of languages.
  *   **Performance on Extremely Large Codebases:** The agent's performance may be slow on very large codebases due to the need to run tests repeatedly. Performance optimization for such cases is a non-goal for the initial version.

  ## Proposed Design

  The agent will operate as a command-line tool that a developer can run on their local repository. It will work on a detached HEAD or a new branch to avoid corrupting the user's existing work.

  ### Architectural Overview

  The agent will follow a pipeline architecture:

  ```mermaid
  graph TD
      A[Input: Commit Range] --> B{Initial Validation};
      B --> C{Change Analysis};
      C --> D{Change Clustering};
      D --> E{Commit Generation Loop};
      E -- Tests Pass --> F{Create Commit};
      F --> E;
      E -- Tests Fail --> G{Refine Cluster};
      G --> E;
      E -- All Changes Committed --> H[Output: New Branch with Clean Commits];
  ```

  ### Detailed Components

  **1. Input and Validation**

  -   The agent will be invoked with a commit range (e.g., `HEAD~3..HEAD`).
  -   **Validation Steps:**
      1.  Check for a clean working directory. Stash any uncommitted changes.
      2.  Create a new temporary branch or worktree to operate in.
      3.  Check out the commit *before* the start of the range.
      4.  Discover and run the test suite to ensure the starting point is valid.
      5.  Check out the final commit in the range.
      6.  Run the test suite again to ensure the final state is valid. If either of these test runs fails, the agent will abort.

  **2. Change Analysis**

  -   The agent will calculate the combined diff of the entire commit range.
  -   This diff will be parsed into a structured format, likely a list of "hunks" (contiguous blocks of changes). Each hunk will be associated with a file and line numbers.

  **3. Change Clustering**

  This is the core logic of the agent. It will use a set of heuristics to group the hunks into logical clusters, where each cluster is a candidate for a new commit.

  -   **Initial Clustering Strategy:**
      -   **File Deletions:** All file deletion hunks will be grouped into a single cluster. This will likely be the last commit.
      -   **New Files:** Hunks related to a newly added file (and its corresponding test file) will be grouped together.
      -   **Syntactic Proximity:** Hunks that modify the same function, class, or syntactic block will be clustered. This can be achieved using tree-sitter for robust code parsing.
      -   **Symbol-based Clustering:** For more complex changes, the agent can use the Language Server Protocol (LSP) or similar tools to find all references to a changed symbol (e.g., a renamed function) and group all related changes.

  **4. Commit Generation Loop**

  This is an iterative process that attempts to create a valid commit from a cluster of changes.

  1.  Start with the clean base commit.
  2.  Select a cluster of changes.
  3.  Apply the changes in the cluster to the working directory.
  4.  Run the project's test suite.
  5.  **If tests pass:**
      -   Create a new commit. A temporary commit message will be generated (e.g., "Feature: Add new_component.js").
      -   The changes in this cluster are now considered "committed," and the new commit becomes the new "base" for the next iteration.
      -   Move to the next cluster.
  6.  **If tests fail:**
      -   The cluster is not truly atomic. The agent needs to refine it.
      -   **Refinement Strategy:** The cluster will be split into smaller sub-clusters. The simplest strategy is to split a multi-hunk cluster into individual hunk clusters and try again. More advanced strategies could try to find the smallest possible combination of hunks that allows tests to pass.
      -   The process repeats with the smaller, refined clusters.

  **5. Test Discovery Mechanism**

  The agent will use a file-based discovery mechanism to find the test command:

  -   Check for `package.json` and a `scripts.test` entry.
  -   Check for a `Makefile` with a `test` target.
  -   Check for `pom.xml`, `build.gradle`, `tox.ini`, etc.
  -   If no standard configuration is found, the user must provide the test command via a command-line argument.

  ### Data Models

  The primary data structure will be a `Hunk`:

  ```
  Hunk {
    file_path: string,
    start_line: int,
    end_line: int,
    content: string[],
    type: 'addition' | 'deletion' | 'modification'
  }
  ```

  A `Cluster` will simply be a `list[Hunk]`.

  ## Risks & Trade-offs

  -   **Performance:** The need to run the full test suite for each potential commit can be very time-consuming.
      -   **Mitigation:** Explore test impact analysis tools to run only the tests relevant to the changes being committed.
  -   **Heuristic Failures:** The clustering heuristics may not always create logically sound commits from a human perspective, even if they pass tests.
      -   **Mitigation:** For v1, the focus is on test-passing commits. A future version could incorporate an interactive mode where the user can approve or modify the suggested clusters.
  -   **Complex Git States:** The agent needs to be robust in its handling of git operations to avoid losing user data.
      -   **Mitigation:** The agent will perform all its work on a dedicated branch, leaving the user's original branches untouched.

  ## Alternatives Considered

  -   **Manual Rebase (`git rebase -i`):** This is the current solution for most developers. It is powerful but manual and error-prone. The proposed agent automates this process.
  -   **Per-File Commits:** A simpler approach would be to create one commit for each modified file. This was rejected because many logical changes span multiple files, and this approach would not create truly atomic commits.
  -   **LLM-based Splitting:** Using a large language model to analyze the diff and propose splits could be very powerful. This was rejected for the initial design due to its complexity and the non-deterministic nature of LLMs. It remains a viable option for future research.

  ## Security & Privacy

  -   The agent runs locally on the user's machine and only interacts with the local file system and git repository.
  -   It will execute the project's test command, which is considered a trusted command provided by the user/project.
  -   There are no network-related operations, so the risk of data exfiltration is minimal.
  -   The agent does not collect any user data or telemetry.
